services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SITE_REPOS: ${SITE_REPOS:?}
        REPO_OWNER: ${REPO_OWNER:?}
        GH_TOKEN: ${GH_TOKEN:?}
    environment:
      PB_URL: ${PB_URL:?}
      PB_USER: ${PB_USER:?}
      PB_PASS: ${PB_PASS:?}
      N8N_URL: ${N8N_URL:?}
      FORM_ID: ${FORM_ID:?}
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "const response = await fetch('http://127.0.0.1:3000/health'); if (!response.ok) process.exit(1);",
        ]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 20s
      